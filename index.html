<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세계 에너지 탐험</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a1628;
  --ocean: #0d2137;
  --surface: #1a2d45;
  --surface2: #223a57;
  --border: #2e4d70;
  --text: #e8f4ff;
  --text-sub: #7aa3c8;
  --text-muted: #3d6080;
  --accent: #4ecdc4;
  --accent2: #ffe66d;
  --green: #2ecc71;
  --green-dim: #0d2e1a;
  --red: #e74c3c;
  --red-dim: #2e0d0d;
  --gold: #f39c12;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text)}

/* ── STARS ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d) var(--delay) infinite}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:var(--op)}}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;z-index:10;animation:fadeIn .35s ease}
.screen.active{display:flex;align-items:center;justify-content:center}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ── START ── */
.start-box{text-align:center;padding:40px;max-width:480px;width:90%}
.globe{font-size:80px;display:block;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 0 30px rgba(78,205,196,.6))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.s-title{font-family:'Black Han Sans',sans-serif;font-size:30px;line-height:1.3;margin:16px 0 8px;background:linear-gradient(135deg,#4ecdc4,#ffe66d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.s-sub{font-size:14px;color:var(--text-sub);margin-bottom:28px;line-height:1.6}
.s-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:28px}
.s-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 8px;text-align:center}
.s-num{font-family:'Black Han Sans',sans-serif;font-size:24px;color:var(--accent)}
.s-lbl{font-size:11px;color:var(--text-muted);margin-top:2px}
.s-btn{width:100%;padding:15px;font-size:17px;font-weight:900;font-family:'Black Han Sans',sans-serif;letter-spacing:.05em;background:linear-gradient(135deg,#4ecdc4,#44a08d);color:#0a1628;border:none;border-radius:14px;cursor:pointer;box-shadow:0 4px 24px rgba(78,205,196,.4);transition:transform .15s}
.s-btn:hover{transform:translateY(-2px)}

/* ── MAP SCREEN ── */
#screen-map{flex-direction:column;overflow:hidden}
.map-header{position:fixed;top:0;left:0;right:0;z-index:20;padding:10px 16px;background:linear-gradient(180deg,var(--bg) 80%,transparent);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.map-title{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--accent);letter-spacing:.03em}
.map-chips{display:flex;gap:6px;align-items:center}
.chip{font-size:12px;padding:4px 12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;color:var(--text-sub)}
.chip b{color:var(--accent2)}
.home-btn{font-size:12px;padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:20px;color:var(--text-sub);cursor:pointer}
.home-btn:hover{background:var(--surface)}

.map-wrap{width:100%;height:100%;overflow:hidden;position:relative;cursor:grab}
.map-wrap:active{cursor:grabbing}
.map-svg-wrap{position:absolute;transform-origin:center center}

/* 나라 스타일 */
.country{fill:#1a3d5c;stroke:#0a1628;stroke-width:.5;cursor:pointer;transition:fill .2s}
.country:hover{fill:#2a5a80}
.country.conquered{fill:#1a4d3a}
.country.failed{fill:#3d1a1a}
.country.active-q{fill:#2a4a6a;stroke:var(--accent);stroke-width:1.5}

/* 핀 */
.map-pin{pointer-events:none;font-size:18px;text-anchor:middle;dominant-baseline:middle;animation:pinPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes pinPop{from{transform:scale(0) translateY(-10px)}to{transform:scale(1) translateY(0)}}

/* 나라 라벨 */
.country-label{pointer-events:none;font-size:9px;fill:#4a7a9b;text-anchor:middle;dominant-baseline:middle;font-family:'Noto Sans KR',sans-serif}

/* 툴팁 */
.map-tooltip{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--text);pointer-events:none;display:none;z-index:30;white-space:nowrap}
.map-tooltip .tt-name{font-weight:700;color:var(--accent);margin-bottom:2px}
.map-tooltip .tt-energy{color:var(--text-sub)}
.map-tooltip .tt-status{font-size:11px;margin-top:4px}

/* ── QUIZ MODAL ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:40;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .25s ease}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:520px;overflow:hidden;animation:modalPop .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes modalPop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{padding:16px 20px 14px;border-bottom:1px solid var(--border);position:relative}
.modal-head::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#4ecdc4,#ffe66d)}
.modal-region{font-size:12px;color:var(--text-muted);letter-spacing:.04em;margin-bottom:4px}
.modal-energy{font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--text)}
.modal-prog{display:flex;gap:6px;margin-top:10px}
.prog-dot{width:28px;height:6px;border-radius:3px;background:var(--surface2);border:1px solid var(--border)}
.prog-dot.ok{background:var(--green)}
.prog-dot.ng{background:var(--red)}
.prog-dot.cur{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.modal-body{padding:18px 20px}
.q-type-tag{display:inline-block;font-size:10px;font-weight:700;padding:2px 9px;border-radius:4px;margin-bottom:8px;letter-spacing:.05em}
.q-label{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.q-text{font-size:14px;line-height:1.7;font-weight:700;color:#fff;margin-bottom:14px}
.opts{display:grid;gap:7px}
.opts.two-col{grid-template-columns:1fr 1fr}
.opt{padding:10px 13px;background:var(--surface2);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:12px;font-family:'Noto Sans KR',sans-serif;color:var(--text);text-align:left;line-height:1.5;transition:border-color .15s,background .15s}
.opt:hover:not(:disabled){border-color:var(--accent);background:#1e3a4a}
.opt.ok{border-color:var(--green);background:var(--green-dim);color:#2ecc71;font-weight:600}
.opt.ng{border-color:var(--red);background:var(--red-dim);color:#e74c3c}
.opt.reveal{border-color:var(--green);background:var(--green-dim);color:#2ecc71;opacity:.65}
.modal-fb{font-size:13px;padding:9px 13px;border-radius:8px;margin-top:8px;display:none;font-weight:600}
.modal-fb.show{display:block}
.modal-fb.ok{background:var(--green-dim);color:var(--green);border:1px solid #2ecc7130}
.modal-fb.ng{background:var(--red-dim);color:var(--red);border:1px solid #e74c3c30}
.modal-next{width:100%;padding:11px;font-size:14px;font-weight:700;font-family:'Black Han Sans',sans-serif;background:var(--accent2);color:#1a1a1a;border:none;border-radius:10px;cursor:pointer;margin-top:10px;display:none}
.modal-next.show{display:block}

/* ── RESULT MODAL ── */
.result-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:400px;padding:28px 24px;text-align:center;animation:modalPop .35s cubic-bezier(.34,1.56,.64,1)}
.result-modal::before{content:'';display:block;height:3px;background:linear-gradient(90deg,#4ecdc4,#ffe66d,#ff6b6b);border-radius:2px;margin-bottom:20px;margin-left:-24px;margin-right:-24px;margin-top:-28px}
.rm-emoji{font-size:48px;margin-bottom:10px}
.rm-title{font-family:'Black Han Sans',sans-serif;font-size:18px;margin-bottom:6px}
.rm-sub{font-size:13px;color:var(--text-sub);margin-bottom:18px}
.rm-score{display:flex;justify-content:center;gap:16px;margin-bottom:20px}
.rm-s{text-align:center}
.rm-v{font-family:'Black Han Sans',sans-serif;font-size:24px}
.rm-l{font-size:11px;color:var(--text-muted)}
.rm-btn{width:100%;padding:12px;font-size:14px;font-weight:700;font-family:'Black Han Sans',sans-serif;border-radius:10px;border:none;cursor:pointer;transition:opacity .15s}
.rm-btn:hover{opacity:.85}
.rm-btn.continue{background:linear-gradient(135deg,#4ecdc4,#44a08d);color:#0a1628;margin-bottom:8px}
.rm-btn.home{background:transparent;color:var(--text-sub);border:1px solid var(--border)}

/* ── FINAL ── */
.final-box{text-align:center;padding:36px 28px;max-width:460px;width:90%;background:var(--surface);border:1px solid var(--border);border-radius:20px}
.final-trophy{font-size:64px;display:block;animation:float 2s ease-in-out infinite;margin-bottom:12px}
.final-title{font-family:'Black Han Sans',sans-serif;font-size:26px;margin-bottom:8px;background:linear-gradient(135deg,#ffe66d,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.final-sub{font-size:13px;color:var(--text-sub);margin-bottom:20px;line-height:1.6}
.final-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.fs-item{padding:14px 8px;text-align:center;border-right:1px solid var(--border)}
.fs-item:last-child{border-right:none}
.fs-val{font-family:'Black Han Sans',sans-serif;font-size:22px;margin-bottom:4px}
.fs-lbl{font-size:11px;color:var(--text-muted)}
.final-btn{width:100%;padding:13px;font-size:15px;font-weight:700;font-family:'Black Han Sans',sans-serif;background:linear-gradient(135deg,#4ecdc4,#44a08d);color:#0a1628;border:none;border-radius:12px;cursor:pointer}

/* 태그 색상 */
.tag-원리{background:#1a2a4a;color:#60a5fa}
.tag-특징{background:#2a1a4a;color:#a78bfa}
.tag-장점{background:#1a3a2a;color:#34d399}
.tag-단점{background:#3a1a1a;color:#f87171}
.tag-설치{background:#3a2a1a;color:#fbbf24}
.tag-비교{background:#2a1a3a;color:#e879f9}

/* 파티클 */
.particle-container{position:fixed;inset:0;pointer-events:none;z-index:999}
.particle{position:absolute;border-radius:50%;animation:particleFly var(--dur) ease-out forwards}
@keyframes particleFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="particle-container" id="particles"></div>
<div class="map-tooltip" id="tooltip">
  <div class="tt-name" id="tt-name"></div>
  <div class="tt-energy" id="tt-energy"></div>
  <div class="tt-status" id="tt-status"></div>
</div>

<!-- ── START ── -->
<div class="screen active" id="screen-start">
  <div class="start-box">
    <span class="globe">🌍</span>
    <div class="s-title">세계 에너지 탐험!</div>
    <div class="s-sub">세계 곳곳을 클릭해 그 지역의 신재생 에너지를 알아보세요.<br>17개 지역을 모두 정복하면 탐험 완료!</div>
    <div class="s-grid">
      <div class="s-box"><div class="s-num">17</div><div class="s-lbl">탐험 지역</div></div>
      <div class="s-box"><div class="s-num">3</div><div class="s-lbl">지역당 문제</div></div>
      <div class="s-box"><div class="s-num">3</div><div class="s-lbl">지역당 도전 가능 횟수</div></div>
    </div>
    <button class="s-btn" onclick="startMap()">🗺️ 탐험 시작!</button>
  </div>
</div>

<!-- ── MAP ── -->
<div class="screen" id="screen-map">
  <div class="map-header">
    <div class="map-title">🌍 세계 에너지 탐험</div>
    <div class="map-chips">
      <div class="chip">정복 <b id="conquered-cnt">0</b>/17</div>
      <div class="chip">정답 <b id="total-correct">0</b></div>
    </div>
  </div>
  <div class="map-wrap" id="map-wrap">
    <div class="map-svg-wrap" id="map-svg-wrap">
      <!-- SVG 세계지도 -->
      <svg id="world-map" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg" style="display:block">
        <rect width="1000" height="500" fill="#0d2137"/>

        <!-- 북아메리카 -->
        <path class="country" id="r-canada" data-region="canada"
          d="M75,55 L270,50 L278,82 L255,105 L210,115 L165,118 L118,128 L82,115 L70,85 Z"/>
        <path class="country" id="r-usa" data-region="usa"
          d="M80,132 L268,128 L272,165 L248,180 L185,183 L125,180 L82,172 Z"/>
        <path class="country" id="r-brazil" data-region="brazil"
          d="M205,268 L295,258 L312,305 L292,348 L255,352 L218,322 L202,295 Z"/>

        <!-- 유럽 -->
        <path class="country" id="r-iceland" data-region="iceland"
          d="M358,72 L392,66 L400,90 L376,97 L354,86 Z"/>
        <path class="country" id="r-norway" data-region="norway"
          d="M430,62 L455,55 L462,90 L440,98 L425,82 Z"/>
        <path class="country" id="r-denmark" data-region="denmark"
          d="M432,102 L452,99 L455,118 L432,121 Z"/>
        <path class="country" id="r-germany" data-region="germany"
          d="M432,125 L468,122 L472,148 L445,153 L428,143 Z"/>

        <!-- 중동/아프리카 -->
        <path class="country" id="r-sahara" data-region="sahara"
          d="M392,202 L510,197 L514,242 L482,254 L395,248 Z"/>
        <path class="country" id="r-saudi" data-region="saudi"
          d="M518,192 L578,187 L585,232 L558,244 L520,234 Z"/>

        <!-- 러시아/아시아 -->
        <path class="country" id="r-russia" data-region="russia"
          d="M468,52 L795,44 L800,108 L755,118 L635,112 L468,102 Z"/>
        <path class="country" id="r-india" data-region="india"
          d="M588,208 L636,203 L640,265 L612,278 L588,262 Z"/>
        <path class="country" id="r-china" data-region="china"
          d="M638,128 L748,120 L754,188 L715,202 L642,196 Z"/>
        <path class="country" id="r-japan" data-region="japan"
          d="M782,122 L804,117 L810,162 L788,167 Z"/>

        <!-- 한국 서해 (한반도 위치) -->
        <ellipse class="country" id="r-westkorea" cx="762" cy="152" rx="15" ry="12"
          data-region="korea" style="fill:#102840;stroke:#2a6080;stroke-width:1.2"/>

        <!-- 오세아니아 -->
        <path class="country" id="r-australia" data-region="australia"
          d="M718,322 L820,312 L832,372 L800,390 L730,388 L715,360 Z"/>
        <path class="country" id="r-newzealand" data-region="newzealand"
          d="M848,358 L872,352 L878,393 L854,400 Z"/>

        <!-- 태평양 (해수온도차) -->
        <ellipse class="country" id="r-pacific" cx="910" cy="272" rx="45" ry="32"
          data-region="pacific" style="fill:#102840;stroke:#1a4060"/>

        <!-- 라벨 -->
        <text class="country-label" x="175" y="85">캐나다</text>
        <text class="country-label" x="176" y="155">미국</text>
        <text class="country-label" x="255" y="308">브라질</text>
        <text class="country-label" x="376" y="82">아이슬란드</text>
        <text class="country-label" x="442" y="78">노르웨이</text>
        <text class="country-label" x="442" y="112">덴마크</text>
        <text class="country-label" x="448" y="138">독일</text>
        <text class="country-label" x="452" y="225">사하라</text>
        <text class="country-label" x="548" y="218">사우디</text>
        <text class="country-label" x="632" y="78">러시아</text>
        <text class="country-label" x="612" y="242">인도</text>
        <text class="country-label" x="692" y="165">중국</text>
        <text class="country-label" x="794" y="142">일본</text>
        <text class="country-label" x="762" y="152" style="fill:#4a9ab8;font-size:8px">한국</text>
        <text class="country-label" x="772" y="355">호주</text>
        <text class="country-label" x="860" y="378">뉴질랜드</text>
        <text class="country-label" x="910" y="272" style="fill:#2a6080">태평양</text>

        <!-- 핀 레이어 -->
        <g id="pins"></g>
      </svg>
    </div>
  </div>
</div>

<!-- ── FINAL ── -->
<div class="screen" id="screen-final">
  <div class="final-box">
    <span class="final-trophy">🏆</span>
    <div class="final-title">세계 정복 완료!</div>
    <div class="final-sub" id="final-sub"></div>
    <div class="final-stats">
      <div class="fs-item"><div class="fs-val" style="color:var(--green)" id="fs-c">0</div><div class="fs-lbl">총 정답</div></div>
      <div class="fs-item"><div class="fs-val" style="color:var(--accent2)" id="fs-r">0</div><div class="fs-lbl">정복 지역</div></div>
      <div class="fs-item"><div class="fs-val" style="color:var(--accent)" id="fs-t">0</div><div class="fs-lbl">총 문제</div></div>
    </div>
    <button class="final-btn" onclick="goHome()">🏠 처음으로 돌아가기</button>
  </div>
</div>

<script>
// ── 별 생성 ──
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<80;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*3}s;--delay:${Math.random()*4}s;--op:${.2+Math.random()*.5}`;
    c.appendChild(s);
  }
})();

// ── 지역 데이터 ──
const REGIONS = {
  canada:     { name:'🇨🇦 캐나다',          energy:'수력',                    icon:'💧', pin:[175,85],  hint:'넓은 국토와 풍부한 강'},
  usa:        { name:'🇺🇸 미국 (서부)',      energy:'태양광',                  icon:'☀️', pin:[176,155], hint:'넓은 사막과 햇빛 풍부'},
  brazil:     { name:'🇧🇷 브라질',          energy:'바이오',                  icon:'🌿', pin:[255,308], hint:'아마존 바이오매스 자원'},
  iceland:    { name:'🇮🇸 아이슬란드',      energy:'지열',                    icon:'🌋', pin:[376,82],  hint:'화산섬, 지각활동 활발'},
  norway:     { name:'🇳🇴 노르웨이',        energy:'수력',                    icon:'💧', pin:[442,78],  hint:'피오르드 지형, 낙차 큰 강'},
  denmark:    { name:'🇩🇰 덴마크',          energy:'풍력',                    icon:'💨', pin:[442,112], hint:'북해 바람이 강한 해안'},
  germany:    { name:'🇩🇪 독일',            energy:'태양광',                  icon:'☀️', pin:[448,138], hint:'재생에너지 선도 국가'},
  saudi:      { name:'🇸🇦 사우디아라비아',  energy:'태양열',                  icon:'🌞', pin:[548,218], hint:'광활한 사막, 강렬한 일조량'},

function shu(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome(){ closeModal(); showScreen('screen-start'); }

function startMap(){
  conquered={}; totalCorrect=0; totalAnswered=0; activeRegion=null;
  document.getElementById('conquered-cnt').textContent='0';
  document.getElementById('total-correct').textContent='0';
  document.querySelectorAll('.country').forEach(el=>{
    el.classList.remove('conquered','failed','active-q');
    el.style.fill='';
  });
  document.getElementById('pins').innerHTML='';
  showScreen('screen-map');
  // 화면 전환 후 실제 크기 기준으로 레이아웃 재계산
  setTimeout(()=>{ setupMap(); }, 50);
}

function setupMap(){
  document.querySelectorAll('.country').forEach(el=>{
    const rk = el.dataset.region;
    if(!REGION_KEYS.includes(rk)) return;
    el.addEventListener('click', ()=>onRegionClick(rk, el));
    el.addEventListener('mouseenter', (e)=>showTooltip(e, rk));
    el.addEventListener('mouseleave', hideTooltip);
    el.addEventListener('mousemove', moveTooltip);
  });

  // 지도 드래그/줌
  const wrap = document.getElementById('map-wrap');
  const svgWrap = document.getElementById('map-svg-wrap');
  let isDragging=false, startX=0, startY=0, tx=0, ty=0, scale=1;

  // 초기 위치 (가운데)
  const setTransform = ()=>{ svgWrap.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`; };

  // 초기 세팅
  const initLayout = ()=>{
    const ww=wrap.clientWidth, wh=wrap.clientHeight;
    const sw=1000, sh=500;
    const headerH = 50;
    scale = Math.min(ww/sw, (wh-headerH)/sh);
    tx = (ww - sw*scale)/2;
    ty = ((wh-headerH) - sh*scale)/2 + headerH;
    svgWrap.style.width=sw+'px';
    svgWrap.style.height=sh+'px';
    setTransform();
  };
  initLayout();
  window.addEventListener('resize', initLayout);

  wrap.addEventListener('mousedown', e=>{isDragging=true; startX=e.clientX-tx; startY=e.clientY-ty;});
  window.addEventListener('mouseup', ()=>isDragging=false);
  window.addEventListener('mousemove', e=>{ if(!isDragging)return; tx=e.clientX-startX; ty=e.clientY-startY; setTransform(); });
  wrap.addEventListener('wheel', e=>{
    e.preventDefault();
    const delta=e.deltaY>0?-.1:.1;
    scale=Math.max(.5,Math.min(3,scale+delta));
    setTransform();
  },{passive:false});
}

function showTooltip(e, rk){
  const r = REGIONS[rk];
  if(!r) return;
  const tt = document.getElementById('tooltip');
  document.getElementById('tt-name').textContent = r.name;
  // 정복한 지역만 에너지 공개
  if(conquered[rk]==='ok'){
    document.getElementById('tt-energy').textContent = r.icon+' '+r.energy;
  } else {
    document.getElementById('tt-energy').textContent = '❓ 어떤 에너지일까?';
  }
  const st = conquered[rk]==='ok' ? '✅ 정복 완료!'
    : conquered[rk]==='giveup' ? '💀 정복 불가 (3회 도전 실패)'
    : conquered[rk]==='fail' ? '❌ 도전 실패 (재도전 가능)'
    : '👆 클릭해서 도전!';
  document.getElementById('tt-status').textContent = st;
  tt.style.display='block';
  moveTooltip(e);
}
function moveTooltip(e){ const tt=document.getElementById('tooltip'); tt.style.left=(e.clientX+12)+'px'; tt.style.top=(e.clientY-10)+'px'; }
function hideTooltip(){ document.getElementById('tooltip').style.display='none'; }

function onRegionClick(rk, el){
  if(activeRegion) return;
  if(conquered[rk]==='giveup') return; // 정복 불가 지역
  if(conquered[rk]==='ok') return;     // 이미 정복한 지역
  const r = REGIONS[rk];
  if(!r) return;
  activeRegion = rk;
  el.classList.add('active-q');
  startRegionQuiz(rk, r);
}

function startRegionQuiz(rk, r){
  const factPool = shu([...(QUESTIONS[r.energy]||[])]).slice(0,2);
  const qList = [
    { mode:'hint2energy', fact:null },
    { mode:'energy2fact', fact:factPool[0] },
    { mode:'energy2fact', fact:factPool[1] },
  ];
  // 도전 횟수 유지 (재도전 시 이전 횟수 이어받기)
  const attempts = (quizState && quizState.rk === rk) ? quizState.attempts + 1 : 1;
  quizState = { rk, r, qs:qList, idx:0, correct:0, results:[], energyRevealed:false, attempts };
  showQuizModal();
}

function showQuizModal(){
  const {r, qs, idx, results} = quizState;
  const q = qs[idx];

  const modal = document.createElement('div');
  modal.className='modal-bg'; modal.id='quiz-modal';

  let bodyHTML = '';
  if(q.mode === 'hint2energy'){
    // 지역 힌트 보여주고 에너지 맞추기
    const correct = r.energy;
    const wrongs = shu(ALL_ENERGIES.filter(e=>e!==correct)).slice(0,3);
    const opts = shu([correct,...wrongs]);
    bodyHTML = `
      <div class="q-type-tag tag-설치">지역 힌트</div>
      <div class="q-label">${idx+1}/3번 · 이 지역의 대표 신재생 에너지는?</div>
      <div class="q-text">📍 ${r.name}<br><span style="font-size:13px;color:var(--text-sub);font-weight:400">${r.hint}</span></div>
      <div class="opts two-col" id="modal-opts">
        ${opts.map(o=>`<button class="opt" onclick="checkHint2Energy(this,'${o}','${correct}')">${ENERGY_ICONS[o]||''} ${o}</button>`).join('')}
      </div>`;
  } else {
    // 에너지 보여주고 특징 맞추기 (에너지는 첫 문제 이후 공개)
    const fact = q.fact;
    const correct = fact.q;
    const energyLabel = quizState.energyRevealed
      ? `${r.icon} ${r.energy}`
      : `${r.icon} ???`;
    // 같은 타입의 다른 에너지 설명을 오답으로
    let cands = [];
    ALL_ENERGIES.filter(e=>e!==r.energy).forEach(e=>{
      (QUESTIONS[e]||[]).filter(f=>f.type===fact.type).forEach(f=>cands.push(f.q));
    });
    if(cands.length<3){
      ALL_ENERGIES.filter(e=>e!==r.energy).forEach(e=>{
        (QUESTIONS[e]||[]).forEach(f=>cands.push(f.q));
      });
    }
    const wrongs = shu([...new Set(cands)]).slice(0,3);
    const opts = shu([correct,...wrongs]);
    bodyHTML = `
      <div class="q-type-tag ${TAG_CLASS[fact.type]||''}">${fact.type}</div>
      <div class="q-label">${idx+1}/3번 · 이 에너지의 ${fact.type} 설명으로 올바른 것은?</div>
      <div class="q-text" style="font-size:20px">${energyLabel}</div>
      <div class="opts" id="modal-opts">
        ${opts.map(o=>`<button class="opt" onclick="checkEnergy2Fact(this,${o===correct},'${correct.replace(/'/g,"\\'")}')" data-q="${o.replace(/"/g,'&quot;')}">${o}</button>`).join('')}
      </div>`;
  }

  modal.innerHTML=`
    <div class="modal">
      <div class="modal-head">
        <div class="modal-region">${r.name}</div>
        <div class="modal-energy">❓ 이 지역의 에너지는?</div>
        <div class="modal-prog">${qs.map((_,i)=>`<div class="prog-dot ${i<idx?(results[i]?'ok':'ng'):(i===idx?'cur':'')}"></div>`).join('')}</div>
      </div>
      <div class="modal-body">
        ${bodyHTML}
        <div class="modal-fb" id="modal-fb"></div>
        <button class="modal-next" id="modal-next" onclick="nextQuizQ()"></button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

function checkHint2Energy(btn, selected, correct){
  checkModalAnswer(btn, selected===correct, correct);
}

function checkEnergy2Fact(btn, isOk, correct){
  checkModalAnswer(btn, isOk, correct);
}

function checkModalAnswer(btn, isOk, correctKey){
  const fb=document.getElementById('modal-fb');
  document.querySelectorAll('#quiz-modal .opt').forEach(b=>b.disabled=true);
  const isFirstQ = quizState.idx === 0 && quizState.qs[0].mode === 'hint2energy';
  if(isOk){
    btn.classList.add('ok');
    quizState.correct++;
    quizState.results.push(true);
    totalCorrect++;
    document.getElementById('total-correct').textContent=totalCorrect;
    spawnParticles(btn);
    // 첫 문제 정답 시 에너지 공개
    if(isFirstQ){
      quizState.energyRevealed = true;
      const r = quizState.r;
      document.querySelector('.modal-energy').textContent = r.icon+' '+r.energy+' 정답! 🎉';
      document.querySelector('.modal-energy').style.color='var(--green)';
      fb.textContent='✅ 정답! 에너지가 공개됐어요!';
    } else {
      fb.textContent='✅ 정답!';
    }
    fb.className='modal-fb show ok';
  } else {
    btn.classList.add('ng');
    fb.textContent='❌ 오답!';
    fb.className='modal-fb show ng';
    quizState.results.push(false);
    // 첫 문제 오답 시에도 에너지 공개 (이후 문제를 위해)
    if(isFirstQ){
      quizState.energyRevealed = true;
      const r = quizState.r;
      document.querySelector('.modal-energy').textContent = r.icon+' '+r.energy;
    }
    const all=[...document.querySelectorAll('#quiz-modal .opt')];
    const cb=all.find(b=>b!==btn&&(b.textContent.includes(correctKey)||(b.dataset.q&&b.dataset.q===correctKey)));
    if(cb) cb.classList.add('reveal');
  }
  totalAnswered++;
  const nb=document.getElementById('modal-next');
  nb.className='modal-next show';
  nb.textContent = quizState.idx===quizState.qs.length-1 ? '결과 확인 →' : '다음 문제 →';
}

function nextQuizQ(){
  quizState.idx++;
  if(quizState.idx >= quizState.qs.length){
    closeModal();
    finishRegion();
  } else {
    closeModal();
    showQuizModal();
  }
}

function closeModal(){
  const m=document.getElementById('quiz-modal');
  if(m) m.remove();
}

function finishRegion(){
  const {rk, r, correct, qs, attempts} = quizState;
  const success = correct >= 3;
  const giveUp = !success && attempts >= 3;
  const el = document.getElementById('r-'+rk);

  if(success){
    conquered[rk]='ok';
    if(el){ el.classList.remove('active-q','failed'); el.classList.add('conquered'); }
    addPin(rk, r);
    spawnRegionParticles();
  } else {
    conquered[rk] = giveUp ? 'giveup' : 'fail';
    if(el){ el.classList.remove('active-q'); el.classList.add('failed'); }
  }

  showResultModal(success, giveUp, correct, qs.length, r, attempts);

  const cnt = Object.values(conquered).filter(v=>v==='ok').length;
  document.getElementById('conquered-cnt').textContent=cnt;
  activeRegion=null;

  if(cnt >= REGION_KEYS.length) setTimeout(showFinal, 1200);
}

function addPin(rk, r){
  const [px,py] = r.pin;
  const pins=document.getElementById('pins');
  const t=document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x',px); t.setAttribute('y',py-14);
  t.setAttribute('class','map-pin'); t.textContent=r.icon;
  pins.appendChild(t);
}

function showResultModal(success, giveUp, correct, total, r, attempts){
  const modal=document.createElement('div');
  modal.className='modal-bg'; modal.id='result-modal';

  let emoji, title, sub, buttons;
  if(success){
    emoji='🎉'; title=r.name+' 정복!';
    sub=`${total}문제 중 ${correct}개 정답 · 완벽해요!`;
    buttons=`<button class="rm-btn continue" onclick="closeResultModal()">계속 탐험하기 🗺️</button>`;
  } else if(giveUp){
    emoji='💀'; title='정복 불가...';
    sub=`3번 도전했지만 실패했어요. 이 지역은 정복할 수 없어요.`;
    buttons=`<button class="rm-btn continue" onclick="closeResultModal()">계속 탐험하기 🗺️</button>`;
  } else {
    emoji='😢'; title='아쉽게 실패...';
    sub=`${total}문제 중 ${correct}개 정답 · 3개 모두 맞춰야 정복 가능 (${attempts}/3회 도전)`;
    buttons=`
      <button class="rm-btn continue" onclick="closeResultModal()">계속 탐험하기 🗺️</button>
      <button class="rm-btn home" style="margin-top:8px;background:var(--surface2);color:var(--accent2);border:1px solid var(--accent2)40" onclick="retryRegion()">🔄 이 지역 다시 도전하기</button>`;
  }

  modal.innerHTML=`
    <div class="result-modal">
      <div class="rm-emoji">${emoji}</div>
      <div class="rm-title">${title}</div>
      <div class="rm-sub">${sub}</div>
      <div class="rm-score">
        <div class="rm-s"><div class="rm-v" style="color:${success?'var(--green)':'var(--red)'}">${correct}/${total}</div><div class="rm-l">정답</div></div>
        <div class="rm-s"><div class="rm-v" style="color:var(--accent)">${r.icon}</div><div class="rm-l">${r.energy}</div></div>
        ${!success?`<div class="rm-s"><div class="rm-v" style="color:var(--text-muted)">${attempts}/3</div><div class="rm-l">도전 횟수</div></div>`:''}
      </div>
      ${buttons}
    </div>`;
  document.body.appendChild(modal);
}

function closeResultModal(){
  const m=document.getElementById('result-modal');
  if(m) m.remove();
  activeRegion=null;
}

function retryRegion(){
  const m=document.getElementById('result-modal');
  if(m) m.remove();
  const {rk, r} = quizState;
  activeRegion = rk;
  startRegionQuiz(rk, r);
}

function showFinal(){
  const cnt=Object.values(conquered).filter(v=>v==='ok').length;
  document.getElementById('fs-c').textContent=totalCorrect;
  document.getElementById('fs-r').textContent=cnt;
  document.getElementById('fs-t').textContent=totalAnswered;
  document.getElementById('final-sub').textContent=
    `총 ${totalAnswered}문제에 도전해 ${totalCorrect}개 정답, ${cnt}개 지역을 정복했어요!`;
  showScreen('screen-final');
}

function spawnParticles(btn){
  const rect=btn.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const colors=['#4ecdc4','#ffe66d','#ff6b6b','#a78bfa','#34d399'];
  const pc=document.getElementById('particles');
  for(let i=0;i<14;i++){
    const p=document.createElement('div'); p.className='particle';
    const sz=4+Math.random()*6, angle=Math.random()*360, dist=50+Math.random()*100;
    const dur=.4+Math.random()*.4;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${Math.sin(angle*Math.PI/180)*dist}px;--dur:${dur}s`;
    pc.appendChild(p);
    setTimeout(()=>p.remove(),dur*1000+100);
  }
}

function spawnRegionParticles(){
  const colors=['#4ecdc4','#ffe66d','#2ecc71','#ff6b6b'];
  const pc=document.getElementById('particles');
  for(let i=0;i<30;i++){
    const p=document.createElement('div'); p.className='particle';
    const sz=5+Math.random()*8;
    const cx=window.innerWidth/2, cy=window.innerHeight/2;
    const angle=Math.random()*360, dist=80+Math.random()*160, dur=.5+Math.random()*.6;
    p.style.cssText=`width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;background:${colors[Math.floor(Math.random()*colors.length)]};--tx:${Math.cos(angle*Math.PI/180)*dist}px;--ty:${Math.sin(angle*Math.PI/180)*dist}px;--dur:${dur}s`;
    pc.appendChild(p);
    setTimeout(()=>p.remove(),dur*1000+100);
  }
}
</script>
</body>
</html>
